services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: shinyoauth-keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    command: ["start-dev", "--http-host=0.0.0.0", "--import-realm"]
    ports:
      - "8080:8080"
    volumes:
      - ./realm-shinyoauth.json:/opt/keycloak/data/import/realm-shinyoauth.json:ro
